# SPA host + reverse proxy for the flood-warning frontend.
# The React build is served statically; all API traffic is proxied to the `api`
# container so the browser sees a single same-origin surface (no CORS).
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # WebSocket / Socket.IO (realtime risk deltas — APIs 44–47).
    location /socket.io/ {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    # REST API — every backend route prefix (@Controller paths) proxied to the api
    # container. The SPA has no path-based router, so these never collide with the
    # static assets below.
    location ~ ^/(auth|users|roles|stations|provinces|map|events|forecasts|risk|reports|weather|integrations|system|health|internal)(/|$) {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 6m;   # station CSV import is capped at 5 MB
    }

    # SPA fallback — the hand-rolled router lives in the client, so any other path
    # returns index.html and lets the app render the right view.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
